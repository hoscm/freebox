# freebox.conf - Apache2 Reverse Proxy Configuration for freeBox Loader
#
# Required modules:
#   sudo a2enmod proxy proxy_http headers
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Deploy:
#   sudo cp freebox.conf /etc/apache2/conf-enabled/freebox.conf

# Disable forward proxy (open proxy prevention)
ProxyRequests Off

# Redirect /freebox (no trailing slash) -> /freebox/ (301)
RedirectMatch permanent ^/freebox$ /freebox/

# Reverse proxy: /freebox/<path> -> http://127.0.0.1:9009/<path>
ProxyPass        /freebox/ http://127.0.0.1:9009/
ProxyPassReverse /freebox/ http://127.0.0.1:9009/

<Location /freebox/>
    # Preserve the original Host header
    ProxyPreserveHost On

    # Inform backend of the original protocol
    RequestHeader set X-Forwarded-Proto "http"
</Location>
